name: AQI CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Import application
        run: |
          python -c "import app"

      - name: Start FastAPI
        run: |
          timeout 10 uvicorn app:app --host 127.0.0.1 --port 8000